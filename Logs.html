<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>使用者歷史紀錄</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --tech-blue: #007bff;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --border-color: #e2e8f0;
        }
        
        /* 支援深色模式 */
        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e2e8f0;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 20px;
            transition: background-color 0.3s;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; background: var(--card-bg); padding: 20px;
            border-radius: 12px; border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 { margin: 0; font-size: 1.5rem; color: var(--tech-blue); }
        
        .back-link { 
            text-decoration: none; color: var(--tech-blue); font-weight: 600;
            display: inline-flex; align-items: center; gap: 5px; margin-bottom: 10px;
        }

        .filter-box { margin-bottom: 20px; display: flex; gap: 10px; }
        
        button {
            padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border-color);
            background: var(--card-bg); color: var(--text-main); cursor: pointer; 
            transition: all 0.3s; font-weight: 500;
        }
        
        button.active { 
            background: var(--tech-blue); color: white; border-color: var(--tech-blue);
            box-shadow: 0 4px 10px rgba(0,123,255,0.3);
        }

        /* 日誌項目樣式 */
        .log-list-container { display: flex; flex-direction: column; gap: 10px; }

        .log-item {
            background: var(--card-bg); padding: 15px 20px;
            border-radius: 10px; border: 1px solid var(--border-color);
            display: grid; grid-template-columns: 200px 120px 1fr;
            align-items: center; transition: 0.2s;
        }
        
        .log-item:hover { border-color: var(--tech-blue); transform: scale(1.01); }
        
        .log-time { font-size: 0.85rem; color: #64748b; font-family: 'Courier New', monospace; }
        
        .log-type {
            font-size: 0.7rem; font-weight: 800; padding: 4px 10px;
            border-radius: 5px; text-align: center; width: fit-content;
            text-transform: uppercase;
        }

        /* 動作類型配色 */
        .type-ENTER { background: #dcfce7; color: #166534; }
        .type-LEAVE { background: #fee2e2; color: #991b1b; }
        .type-SEARCH { background: #e0f2fe; color: #075985; }
        .type-CLICK_LINK { background: #fef9c3; color: #854d0e; }
        .type-VIEW_DETAIL { background: #fae8ff; color: #701a75; }

        .log-details { font-weight: 500; word-break: break-all; }
        
        .session-tag { 
            font-size: 0.7rem; color: #94a3b8; margin-top: 4px; display: block; 
            font-family: monospace;
        }

        #loading { text-align: center; padding: 50px; color: #94a3b8; font-style: italic; }

        @media (max-width: 768px) {
            .log-item { grid-template-columns: 1fr; gap: 8px; }
            .log-time { color: var(--tech-blue); font-weight: bold; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        返回地圖查詢
    </a>

    <div class="header">
        <div>
            <h1>足跡紀錄面板</h1>
            <p style="margin: 5px 0 0 0; font-size: 0.85rem; color: #64748b;">追蹤您的查詢歷史與系統操作</p>
        </div>
        <div id="user-info" style="text-align: right; font-size: 0.75rem; color: #64748b; background: #f1f5f9; padding: 8px; border-radius: 6px;">
            正在讀取身份...
        </div>
    </div>

    <div class="filter-box">
        <button id="btn-mine" class="active">我的紀錄</button>
        <button id="btn-all">全站即時日誌</button>
    </div>

    <div id="log-list" class="log-list-container">
        <div id="loading">連線至雲端資料庫中...</div>
    </div>
</div>

<script src="./config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
    // 解決變數衝突：使用 supabaseClient 替代 supabase
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const myID = localStorage.getItem('tcu_user_id');

    // 套用深色模式
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
    }

    // 顯示當前 Session ID
    document.getElementById('user-info').innerHTML = `<strong>您的識別碼</strong><br>${myID || '尚未生成'}`;

    async function fetchLogs(showAll = false) {
        const listContainer = document.getElementById('log-list');
        listContainer.innerHTML = '<div id="loading">正在擷取最新資料...</div>';

        try {
            let query = supabaseClient
                .from('user_activity_logs')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(100);

            // 如果不是看「全部」，就根據 localStorage 的 ID 進行過濾
            if (!showAll && myID) {
                query = query.eq('user_session_id', myID);
            }

            const { data, error } = await query;

            if (error) throw error;

            if (!data || data.length === 0) {
                listContainer.innerHTML = '<div id="loading">目前沒有任何紀錄軌跡。</div>';
                return;
            }

            listContainer.innerHTML = data.map(log => {
                const isMine = log.user_session_id === myID;
                return `
                <div class="log-item" style="${isMine && showAll ? 'border-left: 4px solid var(--tech-blue);' : ''}">
                    <div class="log-time">${log.event_time_tw || '---'}</div>
                    <div>
                        <span class="log-type type-${log.action_type || 'DEFAULT'}">${log.action_type || 'LOG'}</span>
                    </div>
                    <div class="log-details">
                        ${log.details || '無詳細內容'}
                        <span class="session-tag">Session: ${log.user_session_id || '系統訪客'}</span>
                    </div>
                </div>
                `;
            }).join('');

        } catch (err) {
            console.error("Supabase Fetch Error:", err);
            listContainer.innerHTML = `
                <div style="color:#e53e3e; text-align:center; padding:30px; background:#fff5f5; border-radius:10px;">
                    <strong>讀取失敗</strong><br>${err.message}
                </div>`;
        }
    }

    // 按鈕控制
    document.getElementById('btn-mine').onclick = function() {
        document.getElementById('btn-all').classList.remove('active');
        this.classList.add('active');
        fetchLogs(false);
    };

    document.getElementById('btn-all').onclick = function() {
        document.getElementById('btn-mine').classList.remove('active');
        this.classList.add('active');
        fetchLogs(true);
    };

    // 頁面載入完成後執行
    window.onload = () => {
        fetchLogs(false);
    };
</script>

</body>
</html>
